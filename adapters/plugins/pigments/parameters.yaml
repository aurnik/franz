  filter:
    tool: set_filter
    description: 'Two filters. F1 is the main tone-shaping filter (cutoff/resonance/drive) and is
      where the muddy->distortion move lives; Env 2 is wired to F1 cutoff, so F1 also moves over
      time (see set_mod_envelope). F2 is a FORMANT filter for vowel/vocal/brass-like color, with four
      controls: f2_freq_shift moves the formant center (vowel openness, darker<->brighter), f2_morph
      morphs between vowel shapes (ah/ee/oo character), f2_q_factor sharpens the vowel peaks
      (subtle<->vocal and resonant), f2_blend sets how strongly the formant colors the signal. Engage
      with f2_on for a talking/reedy/brass-like character; the generic cutoff/resonance/drive knobs do
      nothing while Formant is the loaded type, which is why F2 exposes only the four formant knobs.
      On/off targets (f1_on, f2_on): 1.0 = filter active, 0.0 = filter off.'
