      The surgical spectral tool; cut a named region here before it hits the distortion in A2.
      Already ON in the base patch at Dry/Wet 0 — engage it by raising dry_wet, not via enabled.
      On/off target `enabled`: 1.0 = effect engaged, 0.0 = bypassed.
