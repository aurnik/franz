  mod_envelope:
    tool: set_mod_envelope
    description: 'Envelope 2, wired in the patch to FILTER 1 CUTOFF. This is the filter envelope:
      it makes the tone move over the life of each note, on top of the amp envelope (set_envelope).
      Shape it to get plucks, chugs, swells, and pumping. attack = how fast the filter opens at note
      start (0 = instant, the snap of a pluck/chug); decay = how fast it falls back after the attack
      (short decay + low sustain = tight pluck/chug; the core control for a chugging bass); sustain =
      where the filter settles and holds while the key is down; release = how long the filter stays
      open after release. This shapes the envelope CONTOUR; how MUCH it moves the filter is
      filter_env_amount in set_movement (0 = no filter-envelope motion / clean, raise for a stronger
      sweep). So pair this with filter_env_amount, and with the cutoff base value (set_filter
      f1_cutoff) the envelope moves from. Two cautions: (1) the envelope opens the filter UP from
      that f1_cutoff base, so leave the base room to move — if f1_cutoff is already near max the
      upward sweep is inaudible; lower the base first. (2) Keep these times in the same ballpark as
      the amp envelope (set_envelope): if the filter sweep runs much longer than the note''s loudness
      contour, the note fades out before the sweep is heard.'
    params:
      attack:
        name: Env 2 Attack
        index: 13
        sample: '1.00'
      decay:
        name: Env 2 Decay
        index: 14
        sample: '0.500'
      sustain:
        name: Env 2 Sustain
        index: 15
        sample: '0.000'
      release:
