  chorus:
    tool: set_chorus
    description: 'Chorus (JUN-6 model) in FX bus B, slot 1 — thickens and widens the sound with a
      lush ensemble shimmer, the classic way to fatten a thin or static patch ("wider", "lusher",
      "richer"). dry_wet sets how much chorus is blended in; rate is the modulation speed; depth is
      how deep the pitch wobble goes. Engage it by raising dry_wet (on-by-default at Dry/Wet 0),
      not via enabled; Bus B must also be on (see set_mix bus_b_on).'
