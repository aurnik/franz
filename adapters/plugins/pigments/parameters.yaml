    tool: set_envelope
    description: "Amplitude envelope (Env Amp, hardwired to the VCA) \u2014 the note's loudness shape.\
      \ ADSR sets transient (attack/decay), sustain, and release; the curve params bend the\
      \ attack/decay contour for snappy vs soft transients."
    params:
      attack:
        name: Env Amp Attack
        index: 5
        sample: '0.537'
      decay:
