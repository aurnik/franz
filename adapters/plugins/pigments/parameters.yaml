  utility:
    tool: set_utility
    description: 'The Utility engine: a virtual-analog sub-oscillator plus two sample-based Noise
      sources, always present alongside Engines 1/2. Used here as the patch''s sub/noise layer.
      The sub adds low-end weight; the Noise sources add air, grit, transient, or texture (they are
      sample players, not just white noise). Each source has its own Volume and Filter Mix (balance
      between main Filter 1/2) — there is no master Utility output. NOTE: the sub waveform
      (Sine/Tri/Saw/Ramp/Square) and the loaded noise sample are menu/patch choices; Width is
      pulse-width for tri/square only. On/off targets (utility_on, sub_on, noise1_on, noise2_on)
      take 1.0 = ON/audible, 0.0 = OFF/silent — to mute a source set it to 0.0. The Coarse knobs
      (sub_coarse, noise*_coarse) are a bipolar semitone tune spanning -36 st (0.0) to +36 st (1.0),
      linear, so normalized = (semitones + 36) / 72: 0 st (no change) is 0.5, an octave down (-12)
      is 0.333, -24 is 0.167. 0.0 is NOT "no change" — it is -36 st (the bottom). A sub usually sits
      an octave or two BELOW the engines for low-end weight (a sub at the same pitch only doubles the
      fundamental, it does not layer); compute the value from the interval, then read back
      get_parameter''s formatted to confirm.'
