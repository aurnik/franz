  lfo:
    tool: set_lfo
    description: 'The two movement LFOs and their CHARACTER (speed + shape). How MUCH each is heard
      is separate — set it with set_movement (wobble_amount / vibrato_amount); at amount 0 the LFO is
      silent and the sound is clean. wobble_* = LFO 1 -> Filter 1 cutoff (rhythmic filter movement,
      the dubstep "wub"; sync it to tempo for in-time wobble). vibrato_* = LFO 2 -> engine pitch
      (vibrato / pitch movement). For each: rate = speed in Hz when free, sync_division locks it to
      musical note values, waveform = shape (sine = smooth, square = trill/on-off, sample&hold =
      random steps), symmetry skews it, fade ramps it in after the note starts. You must raise the
      matching set_movement amount to hear any of this.'
