synth: Pigments
format: VST3
notes: 'Hand-picked key sound-drivers. Values are normalized 0..1. Params addressed by index:
  Pigments idents equal the index, and 55 display names are ambiguous. ''name'' is for humans + integrity
  checks; ''sample'' is the formatted value at capture time (a unit hint, not a default).'
groups:
  mix:
    tool: set_mix
    description: 'Master, engine, and voice levels / routing (gain & balance). On/off targets
      (engine1_on, engine2_on) take 1.0 = ON/audible, 0.0 = OFF — franz maps that to Pigments''
      actual polarity, so always use 1=on / 0=off regardless of the param''s display name.
      engine1_volume / engine2_volume are the MIXER levels for each engine (the usual "make
      engine N louder/quieter"); they are distinct from oscillator.engine*_main_vol, which is
      the wavetable engine''s INTERNAL output level. For overall engine loudness, use these.'
    params:
      master_volume:
        name: Master Volume
        index: 0
        sample: '-10.2'
      engine1_volume:
        name: Engine 1 Volume
        index: 160
        sample: '0.000'
      engine2_volume:
        name: Engine 2 Volume
        index: 162
        sample: '0.000'
      engine1_on:
        name: Engine 1 Bypass
        index: 80
        on_value: 0.0
      engine2_on:
        name: Engine 2 Bypass
        index: 120
        on_value: 0.0
      engine1_filter_mix:
        name: Engine1 Filter Mix
        index: 161
        sample: '0.000'
      engine2_filter_mix:
