  distortion:
    tool: set_distortion
    description: 'Distortion in FX slot A2 (after the EQ, before the reverb). drive sets the
      distortion amount; output_gain trims level (auto-gain is on, so output_gain may have
      little effect). This effect is already ON in the base patch at Dry/Wet 0 (inert) — engage it
      by raising dry_wet; do not touch enabled to bring it in. The distortion has its OWN built-in
      filter (separate from F1/F2 in set_filter) for shaping the grit: filter_on engages it;
      filter_cutoff (in Hz) / filter_resonance shape it; filter_mode picks the type at exact values
      0.0=low-pass, 0.333=high-pass, 0.667=band-pass, 1.0=notch (other values are unused — use
      only these four); filter_routing places it Pre (0.0, before the distortion — e.g.
      high-pass so the low end is not gritted) or Post (1.0, after it — e.g. low-pass to tame
      fizz/harshness); filter_dark softens the filter''s top end.'
