  oscillator:
    tool: set_oscillator
    description: 'Wavetable engine front-panel controls for Engine 1 and Engine 2 (the patch loads
      the BASIC WAVEFORMS table on both). Position is the primary timbre morph and selects the
      oscillator shape: 0.0 = sine, 0.333 = triangle, 0.667 = saw, 1.0 = square, blending in
      between — use these exact anchors for a named waveform, never guess (e.g. triangle is 0.333,
      not 0.5). Fold Amount and Phase Distortion Amount add harmonics/edge; Mod Amount + PM Amount
      drive the FM/phase-mod modulator oscillator (level via Mod Vol). engine*_coarse is a bipolar
      semitone tune spanning -36 st (0.0) to +36 st (1.0), linear, so normalized = (semitones + 36)
      / 72: 0 st (no change) is 0.5, an octave down (-12) is 0.333, -24 is 0.167, +12 is 0.667.
      Compute the value from the interval you want — do NOT guess (0.25 is -18 st, not an octave) —
      then read back get_parameter''s formatted to confirm. NOTE: the wavetable SELECTION,
      the Fold type, Phase-Distortion type, and Mod type are menu/patch choices, not
      parameter-addressable — only the continuous *Amount/Position knobs morph the loaded table.
      Two different "volume" knobs exist per engine: engine*_main_vol HERE is the wavetable
      engine''s INTERNAL output level; to set how loud the engine sits in the overall mix, use
      mix.engine*_volume (set_mix) instead — that mixer level is the usual "engine louder/quieter".'
