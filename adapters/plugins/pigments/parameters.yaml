  unison:
    tool: set_unison
    description: 'Per-engine voice stacking for width and thickness. Voices + Detune + Stereo
      widen/fatten the sound; Mode picks the stacking style (Unison/Chord/Super); Unison is the
      section on/off. Covers both Wavetable engines (Engine 1/2). Turning a unison section on does
      nothing on its own — you must raise *_voices above 1 (e.g. 3-7); on with 1 voice is inaudible,
      so always set voices whenever you engage unison.
      samples not captured in this dump — re-dump with values to fill the unit hints.'
