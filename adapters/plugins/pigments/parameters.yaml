  movement:
    tool: set_movement
    description: 'How MUCH of each patch movement is applied — the clean-vs-animated controls. Each
      target is a macro that scales one modulation routing: 0 = that movement is OFF (clean/static),
      1 = full depth. For a clean, static sound set all three to 0. To animate, raise the one you want
      and shape its character elsewhere: wobble_amount pairs with set_lfo wobble_* (filter wobble),
      vibrato_amount with set_lfo vibrato_* (pitch vibrato), filter_env_amount with set_mod_envelope
      (the per-note filter pluck/chug). These set DEPTH; the shape tools set CHARACTER.'
    params:
      wobble_amount:
        name: Macro 1
        index: 1
        sample: '0.000'
      vibrato_amount:
        name: Macro 2
        index: 2
        sample: '0.000'
      filter_env_amount:
